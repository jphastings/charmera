name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required for GoReleaser to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history & tags for the changelog

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # exiftool/ffmpeg let the EXIF-validation and transcode tests actually run
      # (they skip gracefully when absent); the Photos tests are string-only.
      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libimage-exiftool-perl

      - name: Test
        run: go test ./...

      - name: Release
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
