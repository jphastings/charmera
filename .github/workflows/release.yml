name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required for GoReleaser to create the release

jobs:
  release:
    # macOS runner: the binary uses cgo (onnxruntime), and the universal build
    # cross-compiles amd64 from this arm64 runner via clang.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history & tags for the changelog

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # Tests that need ffmpeg/exiftool/onnxruntime skip gracefully when those
      # aren't installed; this gate covers the build and the pure-Go logic.
      - name: Test
        run: go test ./...

      - name: Release
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
