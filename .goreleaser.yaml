version: 2

project_name: charmera

before:
  hooks:
    - go mod tidy

builds:
  # cgo is required for the onnxruntime binding (orientation detection), so the
  # release must be built on macOS. amd64 is cross-compiled from the arm64
  # runner by pointing clang at each architecture.
  - main: .
    binary: charmera
    env:
      - CGO_ENABLED=1
    # macOS-only: the tool drives the Photos app and assumes /Volumes.
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: darwin
        goarch: amd64
        env:
          - CC=clang -arch x86_64
      - goos: darwin
        goarch: arm64
        env:
          - CC=clang -arch arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"

# Ship a single universal binary that runs on both Intel and Apple Silicon.
universal_binaries:
  - replace: true

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
